<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <style>
        :root {
            --bg: #121212; 
            --card-bg: #1c1c1c;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #666666;
            --in-stock: #00ff88;
            --out-stock: #ff4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Rotating Loader */
        #loader-container {
            text-align: center;
            margin-top: 150px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader-text {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Sort Buttons */
        .sort-bar {
            display: none;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 25px;
        }

        .sort-btn {
            background: #222;
            border: none;
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }

        .sort-btn.active {
            background: var(--accent);
            color: #000;
        }

        /* Stock Items */
        .stock-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .stock-item:hover { border-color: #333; }

        /* Description Box */
        .item-detail {
            display: none;
            background: #161616;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.5;
            border: 1px solid #222;
        }

        .item-name { font-weight: 600; font-size: 1rem; }
        .price { font-weight: 700; font-size: 1.1rem; }
        .status { font-size: 0.65rem; font-weight: 800; margin-top: 4px; letter-spacing: 0.5px; }
        .in { color: var(--in-stock); }
        .out { color: var(--out-stock); }

        .warning-box {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--out-stock);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        a { color: var(--text-main); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader-container">
            <div class="spinner"></div>
            <div id="loader-text">CHECKING LIVE STOCK...</div>
        </div>

        <div id="main-content" style="display:none;">
            <div class="sort-bar">
                <button class="sort-btn active" id="sort-az" onclick="sortData('az')">A-Z</button>
                <button class="sort-btn" id="sort-price" onclick="sortData('price')">PRICE</button>
            </div>

            <div id="list"></div>

            <div class="footer">
                CONTACT: <a href="mailto:getintouch@stockstatus.uk">getintouch@stockstatus.uk</a><br>
                REPLIES TYPICALLY WITHIN 2-3 BUSINESS DAYS
            </div>
        </div>
    </div>

    <script>
        let rawData = [];

        window.onload = function() {
            setTimeout(loadStock, 1500);
        };

        function loadStock() {
            fetch('stock.json')
                .then(res => res.json())
                .then(data => {
                    rawData = data;
                    document.getElementById('loader-container').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.querySelector('.sort-bar').style.display = 'flex';
                    sortData('az');
                });
        }

        function toggleDetail(index) {
            const el = document.getElementById('detail-' + index);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.item-detail').forEach(d => d.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function sortData(type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-' + type).classList.add('active');

            if (type === 'az') {
                rawData.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                rawData.sort((a, b) => {
                    let p1 = parseFloat(a.price.replace(/[£,]/g, '')) || 0;
                    let p2 = parseFloat(b.price.replace(/[£,]/g, '')) || 0;
                    return p1 - p2;
                });
            }
            render();
        }

        function render() {
            let html = '';
            rawData.forEach((item, index) => {
                const isStock = item.stock === 'YES';
                const isGreggs = item.name.toLowerCase().includes('greggs');
                const description = item.desc || "No additional information available for this item.";
                
                if (isGreggs && !isStock) {
                    html += `
                    <div class="warning-box">
                        <strong style="color:var(--out-stock)">IMPORTANT:</strong> Greggs accounts are currently OOS. 
                        Please note that on <span style="text-decoration:underline">June 7th</span>, prices will increase from 35p to 50p per unit.
                    </div>`;
                }

                html += `
                <div class="stock-item" onclick="toggleDetail(${index})">
                    <div>
                        <div class="item-name">${item.name}</div>
                        <div class="status ${isStock ? 'in' : 'out'}">${isStock ? 'AVAILABLE' : 'OUT OF STOCK'}</div>
                    </div>
                    <div class="price">${item.price}</div>
                </div>
                <div class="item-detail" id="detail-${index}">
                    ${description}
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
        }
    </script>
</body>
</html>
