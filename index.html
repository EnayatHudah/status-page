<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <style>
        :root {
            --bg: #121212; 
            --card-bg: #1c1c1c;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #666666;
            --in-stock: #00ff88;
            --out-stock: #ff4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        #loader {
            text-align: center;
            margin-top: 150px;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 3px;
        }

        .stock-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name { font-weight: 500; }
        .price { font-weight: 700; color: var(--accent); }
        .status { font-size: 0.7rem; font-weight: 700; margin-top: 4px; }
        .in { color: var(--in-stock); }
        .out { color: var(--out-stock); }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        a { color: var(--text-main); text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader">CHECKING LIVE STOCK...</div>
        <div id="list" style="display:none;"></div>

        <div class="footer">
            CONTACT: <a href="mailto:getintouch@stockstatus.uk">getintouch@stockstatus.uk</a><br>
            REPLIES WITHIN 2-3 BUSINESS DAYS
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(loadStock, 1000);
        };

        function loadStock() {
            fetch('stock.json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('list').style.display = 'block';
                    let html = '';
                    data.forEach(item => {
                        const isStock = item.stock === 'YES';
                        html += `
                        <div class="stock-item">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div class="status ${isStock ? 'in' : 'out'}">${isStock ? 'AVAILABLE' : 'SOLD OUT'}</div>
                            </div>
                            <div class="price">${item.price}</div>
                        </div>`;
                    });
                    document.getElementById('list').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('loader').innerText = "ERROR LOADING STOCK";
                });
        }
    </script>
</body>
</html>
