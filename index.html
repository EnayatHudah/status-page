<!DOCTYPE html>
<html>
<head>
    <title>Stock Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Carbon Dark Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #121212; /* Carbon Black */
            color: #e0e0e0; 
            margin: 0;
        }

        .restock-banner { 
            background: #1e1e1e; 
            color: #ffcc00; 
            padding: 14px 25px; 
            margin: 20px 0 40px 0; 
            border-radius: 50px; /* Pill shape */
            font-weight: 600;
            border: 1px solid #333;
            display: inline-block;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-weight: 300; letter-spacing: 2px; color: #ffffff; }

        table { 
            width: 100%; 
            max-width: 900px;
            margin: 0 auto;
            border-collapse: separate; 
            border-spacing: 0;
            background: #1a1a1a; 
            border-radius: 20px; /* Extra smooth */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #282828;
        }

        th, td { padding: 20px; text-align: left; border-bottom: 1px solid #282828; }

        th { 
            background: #252525; 
            color: #aaa; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px; 
        }

        /* Price Colour: GreenYellow */
        .price-tag { 
            color: #ADFF2F; 
            font-weight: bold; 
            font-family: 'Courier New', Courier, monospace; /* Makes it look like a digital tag */
            font-size: 1.1rem;
        }

        .in { color: #00ff88; font-weight: bold; letter-spacing: 0.5px; }
        .out { color: #ff4444; font-weight: bold; opacity: 0.8; }

        /* Remove border from last row */
        tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

    <div class="restock-banner">
        Next Predicted Restock: 6PM BST Next Working Day
    </div>

    <h1>LIVE INVENTORY</h1>
    <div id="list">Loading...</div>

    <script>
        fetch('stock.json')
            .then(res => res.json())
            .then(data => {
                let html = '<table><tr><th>Item Description</th><th>Price</th><th>Availability</th></tr>';
                data.forEach(item => {
                    html += `<tr>
                        <td>${item.name}</td>
                        <td class="price-tag">${item.price}</td>
                        <td class="${item.stock == 'YES' ? 'in' : 'out'}">${item.stock == 'YES' ? '● IN STOCK' : '○ OUT OF STOCK'}</td>
                    </tr>`;
                });
                document.getElementById('list').innerHTML = html + '</table>';
            });
    </script>
</body>
</html>
